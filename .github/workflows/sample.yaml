name: DevSecOps AI Inspector CI/CD

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'ARTICLE.md'
      - '**.md'
      - '.gitignore'
      - '.dockerignore'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:        us-east-1
  ECS_CLUSTER:       aws-secops-ai-inspector-cluster
  BACKEND_REPO:      aws-secops-ai-inspector-backend
  FRONTEND_REPO:     aws-secops-ai-inspector-frontend
  BACKEND_SERVICE:   aws-secops-ai-inspector-backend
  FRONTEND_SERVICE:  aws-secops-ai-inspector-frontend

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push backend ──────────────────────────────────────────────
      - name: Build & Push Backend
        id: backend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          docker build -f Dockerfile.backend \
            -t $REGISTRY/$BACKEND_REPO:$TAG \
            -t $REGISTRY/$BACKEND_REPO:latest .
          docker push $REGISTRY/$BACKEND_REPO:$TAG
          docker push $REGISTRY/$BACKEND_REPO:latest
          echo "image=$REGISTRY/$BACKEND_REPO:$TAG" >> $GITHUB_OUTPUT

      # ── Build & push frontend ─────────────────────────────────────────────
      - name: Build & Push Frontend
        id: frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          # Pass the backend service URL so Next.js rewrites work inside ECS
          BACKEND_URL="http://${BACKEND_SERVICE}:8000"
          docker build -f Dockerfile.frontend \
            --build-arg BACKEND_URL=$BACKEND_URL \
            -t $REGISTRY/$FRONTEND_REPO:$TAG \
            -t $REGISTRY/$FRONTEND_REPO:latest .
          docker push $REGISTRY/$FRONTEND_REPO:$TAG
          docker push $REGISTRY/$FRONTEND_REPO:latest
          echo "image=$REGISTRY/$FRONTEND_REPO:$TAG" >> $GITHUB_OUTPUT

      # ── Update ECS task definitions & deploy ─────────────────────────────
      - name: Deploy Backend to ECS
        env:
          IMAGE: ${{ steps.backend.outputs.image }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $BACKEND_SERVICE --region $AWS_REGION \
            --query "taskDefinition")
          NEW_DEF=$(echo $TASK_DEF | python3 -c "
          import json,sys
          td=json.load(sys.stdin)
          td['containerDefinitions'][0]['image']='$IMAGE'
          [td.pop(k,None) for k in ['taskDefinitionArn','revision','status',
            'requiresAttributes','compatibilities','registeredAt','registeredBy']]
          print(json.dumps(td))")
          NEW_ARN=$(aws ecs register-task-definition \
            --region $AWS_REGION --cli-input-json "$NEW_DEF" \
            --query "taskDefinition.taskDefinitionArn" --output text)
          aws ecs update-service --cluster $ECS_CLUSTER \
            --service $BACKEND_SERVICE --task-definition $NEW_ARN \
            --force-new-deployment --region $AWS_REGION
          echo "✅ Backend deployed: $IMAGE"

      - name: Deploy Frontend to ECS
        env:
          IMAGE: ${{ steps.frontend.outputs.image }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $FRONTEND_SERVICE --region $AWS_REGION \
            --query "taskDefinition")
          NEW_DEF=$(echo $TASK_DEF | python3 -c "
          import json,sys
          td=json.load(sys.stdin)
          td['containerDefinitions'][0]['image']='$IMAGE'
          [td.pop(k,None) for k in ['taskDefinitionArn','revision','status',
            'requiresAttributes','compatibilities','registeredAt','registeredBy']]
          print(json.dumps(td))")
          NEW_ARN=$(aws ecs register-task-definition \
            --region $AWS_REGION --cli-input-json "$NEW_DEF" \
            --query "taskDefinition.taskDefinitionArn" --output text)
          aws ecs update-service --cluster $ECS_CLUSTER \
            --service $FRONTEND_SERVICE --task-definition $NEW_ARN \
            --force-new-deployment --region $AWS_REGION
          echo "✅ Frontend deployed: $IMAGE"
